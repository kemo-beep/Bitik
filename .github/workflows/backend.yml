name: Backend

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: bitik
          POSTGRES_USER: bitik
          POSTGRES_PASSWORD: bitik
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bitik -d bitik"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
      opensearch:
        image: opensearchproject/opensearch:2.19.1
        env:
          discovery.type: single-node
          plugins.security.disabled: "true"
          OPENSEARCH_JAVA_OPTS: -Xms256m -Xmx256m
        ports:
          - 9200:9200
      minio:
        image: minio/minio:RELEASE.2025-01-20T14-49-07Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      BITIK_DATABASE_URL: postgres://bitik:bitik@localhost:5432/bitik?sslmode=disable
      BITIK_REDIS_ADDR: localhost:6379
      BITIK_RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      BITIK_SEARCH_URL: http://localhost:9200
      BITIK_STORAGE_ENDPOINT: localhost:9000
      BITIK_STORAGE_ACCESS_KEY_ID: minioadmin
      BITIK_STORAGE_SECRET_ACCESS_KEY: minioadmin
      BITIK_STORAGE_BUCKET: bitik-ci
      BITIK_TEST_DATABASE_URL: postgres://bitik:bitik@localhost:5432/bitik?sslmode=disable
      BITIK_TEST_RABBITMQ_URL: amqp://guest:guest@localhost:5672/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
      - name: Wait for OpenSearch
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9200 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "OpenSearch did not become ready in time"
          exit 1
      - name: Create MinIO bucket
        run: |
          docker run --rm --network host minio/mc:RELEASE.2025-01-17T23-25-50Z \
            sh -c 'mc alias set local http://127.0.0.1:9000 minioadmin minioadmin && mc mb --ignore-existing local/bitik-ci'
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: SQLC drift check
        run: |
          "$(go env GOPATH)/bin/sqlc" generate
          git diff --exit-code -- internal/store sqlc.yaml
      - name: Migration up/down check
        run: |
          go run ./cmd/migrate up
          go run ./cmd/migrate down
          go run ./cmd/migrate up
      - name: Migration status
        run: go run ./cmd/migrate status
      - name: Seed data
        run: go run ./cmd/seed
      - name: Unit tests
        run: go test ./...
      - name: Integration tests
        run: go test -tags=integration ./...
      - name: OpenAPI contract check
        run: go test ./internal/openapi -run TestOpenAPIMVPContract
      - name: Coverage report
        run: go test ./... -covermode=atomic -coverprofile=coverage.out
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
      - name: Docker build
        run: docker build -t bitik-backend:ci .
      - run: go build ./...

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Go dependency vulnerability scan
        run: govulncheck ./...
      - name: Go static security scan
        uses: securego/gosec@master
        with:
          args: ./...
      - name: Filesystem container/dependency scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: backend
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
