name: web-cd-preview

on:
  pull_request:
    paths:
      - "bitik-web/**"
      - ".github/workflows/web-cd-preview.yml"

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: web-cd-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: meta
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/bitik-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: tags
        run: |
          sha_short=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag_pr=pr-${{ github.event.pull_request.number }}-${sha_short}" >> "$GITHUB_OUTPUT"

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: ./bitik-web
          file: ./bitik-web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.tags.outputs.tag_pr }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.PREVIEW_NEXT_PUBLIC_API_BASE_URL || 'https://api.preview.localhost/api/v1' }}
            NEXT_PUBLIC_ASSET_BASE_URL=${{ vars.PREVIEW_NEXT_PUBLIC_ASSET_BASE_URL || 'https://api.preview.localhost' }}
            NEXT_PUBLIC_WS_BASE_URL=${{ vars.PREVIEW_NEXT_PUBLIC_WS_BASE_URL || 'wss://ws.preview.localhost' }}
            NEXT_PUBLIC_OAUTH_REDIRECT_BASE_URL=${{ vars.PREVIEW_NEXT_PUBLIC_OAUTH_REDIRECT_BASE_URL || 'https://web.preview.localhost' }}
            NEXT_PUBLIC_FEATURE_FLAGS=${{ vars.PREVIEW_NEXT_PUBLIC_FEATURE_FLAGS || '{}' }}
            NEXT_PUBLIC_ANALYTICS_ENABLED=${{ vars.PREVIEW_NEXT_PUBLIC_ANALYTICS_ENABLED || '0' }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.PREVIEW_NEXT_PUBLIC_SENTRY_DSN || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed \`${{ steps.meta.outputs.image }}:${{ steps.tags.outputs.tag_pr }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Configure Dockploy to pull this tag for PR preview environments." >> "$GITHUB_STEP_SUMMARY"
