openapi: 3.0.3
info:
  title: Bitik Backend API
  version: 0.1.0
  description: Baseline OpenAPI contract for the Bitik marketplace backend.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Application is alive.
  /ready:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Application dependencies are ready.
        "503":
          description: One or more dependencies are unavailable.
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus metrics payload.
  /version:
    get:
      summary: Version metadata
      responses:
        "200":
          description: Application version metadata.
  /api/v1:
    get:
      summary: API root
      responses:
        "200":
          description: API metadata.

  /api/v1/auth/register:
    post:
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Access/refresh tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAuthPair"

  /api/v1/auth/login:
    post:
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Access/refresh tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAuthPair"

  /api/v1/auth/logout:
    post:
      summary: Logout (revoke refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"

  /api/v1/auth/refresh-token:
    post:
      summary: Refresh access token (rotation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New access/refresh tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAuthPair"

  /api/v1/auth/forgot-password:
    post:
      summary: Request password reset token (always ok)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"

  /api/v1/auth/reset-password:
    post:
      summary: Reset password using reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"

  /api/v1/auth/verify-email:
    post:
      summary: Verify email using verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"

  /api/v1/auth/resend-email-verification:
    post:
      summary: Resend email verification (authenticated)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Verification resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"

  /api/v1/auth/send-phone-otp:
    post:
      summary: Send phone OTP (authenticated)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string }
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"

  /api/v1/auth/verify-phone-otp:
    post:
      summary: Verify phone OTP (authenticated)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string }
                otp: { type: string }
      responses:
        "200":
          description: Phone verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"

  /api/v1/analytics/events:
    post:
      summary: Ingest analytics event payload (authenticated user)
      security: [{ bearerAuth: [] }]
      responses:
        "202": { description: Event accepted for async processing. }

  /api/v1/users/me:
    get:
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopePublicUser"
    delete:
      summary: Delete current user account (soft delete)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Account deleted. }

  /api/v1/users/me/profile:
    get:
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Profile. }
    patch:
      summary: Update current user profile
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Updated profile. }

  /api/v1/users/me/sessions:
    get:
      summary: List user sessions
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Sessions. }

  /api/v1/users/me/sessions/{session_id}:
    delete:
      summary: Revoke a user session
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: session_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Session revoked. }

  /api/v1/users/me/devices:
    get:
      summary: List user devices
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Devices. }

  /api/v1/users/me/devices/{device_id}:
    delete:
      summary: Revoke a user device
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: device_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Device revoked. }
  /api/v1/public/home:
    get:
      summary: Public homepage payload
      responses:
        "200": { description: Homepage banners, sections, and featured products. }
  /api/v1/public/home/sections:
    get:
      summary: Public homepage sections
      responses:
        "200": { description: Public CMS-backed homepage sections. }
  /api/v1/public/banners:
    get:
      summary: Public banners
      parameters:
        - { name: placement, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: per_page, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200": { description: Active banners for a placement. }
  /api/v1/public/categories:
    get:
      summary: Public categories
      responses:
        "200": { description: Active category list. }
  /api/v1/public/categories/{category_id}:
    get:
      summary: Public category detail
      parameters:
        - { name: category_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Category detail. }
        "404": { description: Category not found. }
  /api/v1/public/categories/{category_id}/products:
    get:
      summary: Products in category
      parameters:
        - { name: category_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: sort, in: query, schema: { type: string, enum: [newest, price_asc, price_desc, popular, rating] } }
      responses:
        "200": { description: Paginated products. }
  /api/v1/public/brands:
    get:
      summary: Public brands
      responses:
        "200": { description: Active brand list. }
  /api/v1/public/brands/{brand_id}:
    get:
      summary: Public brand detail
      parameters:
        - { name: brand_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Brand detail. }
        "404": { description: Brand not found. }
  /api/v1/public/brands/{brand_id}/products:
    get:
      summary: Products by brand
      parameters:
        - { name: brand_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Paginated products. }
  /api/v1/public/products:
    get:
      summary: Public product list
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: category_id, in: query, schema: { type: string, format: uuid } }
        - { name: brand_id, in: query, schema: { type: string, format: uuid } }
        - { name: seller_id, in: query, schema: { type: string, format: uuid } }
        - { name: min_price_cents, in: query, schema: { type: integer } }
        - { name: max_price_cents, in: query, schema: { type: integer } }
        - { name: sort, in: query, schema: { type: string, enum: [newest, price_asc, price_desc, popular, rating] } }
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: per_page, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200": { description: Paginated products with pagination metadata. }
  /api/v1/public/products/slug/{slug}:
    get:
      summary: Public product detail by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Product detail with images and variants. }
        "404": { description: Product not found. }
  /api/v1/public/products/{product_id}:
    get:
      summary: Public product detail
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Product detail with images and variants. }
        "404": { description: Product not found. }
  /api/v1/public/products/{product_id}/variants:
    get:
      summary: Public product variants
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Active variants. }
  /api/v1/public/products/{product_id}/reviews:
    get:
      summary: Public product reviews
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Visible product reviews. }
  /api/v1/public/products/{product_id}/related:
    get:
      summary: Related products
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Related active products. }
  /api/v1/public/sellers/slug/{slug}:
    get:
      summary: Public seller detail by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Seller detail. }
        "404": { description: Seller not found. }
  /api/v1/public/sellers/{seller_id}:
    get:
      summary: Public seller detail
      parameters:
        - { name: seller_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Seller detail. }
        "404": { description: Seller not found. }
  /api/v1/public/sellers/{seller_id}/products:
    get:
      summary: Public seller products
      parameters:
        - { name: seller_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Paginated seller products. }
  /api/v1/public/sellers/{seller_id}/reviews:
    get:
      summary: Public seller reviews
      parameters:
        - { name: seller_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Visible seller reviews. }
  /api/v1/media/upload:
    post:
      summary: Upload seller/admin media
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201": { description: Uploaded media metadata. }
  /api/v1/media/upload/presigned-url:
    post:
      summary: Create presigned seller/admin media upload URL
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Presigned upload URL and reserved media metadata. }
  /api/v1/media/upload/presigned-complete:
    post:
      summary: Complete and validate a presigned media upload
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Validated media metadata. }
  /api/v1/media/files:
    get:
      summary: List current user's media files
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Media files. }
  /api/v1/media/files/{file_id}:
    get:
      summary: Get media file metadata
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: file_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Media file metadata. }
        "404": { description: Media file not found. }
    delete:
      summary: Delete media file
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: file_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Media file deleted. }
  /api/v1/seller/apply:
    post:
      summary: Create or submit seller application
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Seller application created. }
  /api/v1/seller/application:
    get:
      summary: Get current seller application
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Current seller application. }
    patch:
      summary: Update current seller application
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Updated seller application. }
  /api/v1/seller/documents:
    post:
      summary: Add seller application or account document
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Seller document created. }
  /api/v1/seller/documents/{document_id}:
    delete:
      summary: Delete seller document
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: document_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Seller document deleted. }
  /api/v1/seller/me:
    get:
      summary: Get current seller profile
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Seller profile. }
    patch:
      summary: Update current seller profile
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Updated seller profile. }
  /api/v1/seller/me/settings:
    patch:
      summary: Update seller settings
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Updated seller settings. }
  /api/v1/seller/me/media:
    patch:
      summary: Update seller logo or banner URLs
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Updated seller media. }
  /api/v1/seller/dashboard:
    get:
      summary: Seller dashboard stats, chart, top products, orders, and low stock
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Seller dashboard payload. }
  /api/v1/seller/products:
    get:
      summary: List seller products
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Paginated seller products. }
    post:
      summary: Create seller product
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Product created. }
  /api/v1/seller/products/{product_id}:
    get:
      summary: Get seller product
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Seller product detail. }
    patch:
      summary: Update seller product
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Product updated. }
    delete:
      summary: Soft-delete seller product
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Product deleted. }
  /api/v1/seller/products/{product_id}/publish:
    post:
      summary: Publish approved seller product
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Product published. }
  /api/v1/seller/products/{product_id}/unpublish:
    post:
      summary: Unpublish seller product
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Product unpublished. }
  /api/v1/seller/products/{product_id}/duplicate:
    post:
      summary: Duplicate seller product as draft
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "201": { description: Product duplicated. }
  /api/v1/seller/products/{product_id}/images:
    get:
      summary: List product images
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Product images. }
    post:
      summary: Add product image
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "201": { description: Product image created. }
  /api/v1/seller/products/{product_id}/variants:
    get:
      summary: List product variants
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Product variants. }
    post:
      summary: Create product variant and inventory item
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "201": { description: Variant created. }
  /api/v1/seller/inventory:
    get:
      summary: List seller inventory
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Seller inventory. }
  /api/v1/seller/inventory/low-stock:
    get:
      summary: List low-stock inventory
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Low-stock inventory. }
  /api/v1/seller/inventory/{inventory_id}/adjust:
    post:
      summary: Adjust inventory with row-level locking and movement record
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: inventory_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Updated inventory and movement. }
  /api/v1/admin/seller-applications:
    get:
      summary: Admin list seller applications
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Seller applications. }
  /api/v1/admin/seller-applications/{application_id}/review:
    post:
      summary: Admin approve, reject, or mark seller application in review
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: application_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Reviewed application. }
  /api/v1/admin/sellers/{seller_id}/status:
    patch:
      summary: Admin update seller status
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: seller_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Updated seller. }
  /api/v1/admin/products/{product_id}/moderation:
    patch:
      summary: Admin moderate product
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Moderated product. }

  /api/v1/admin/categories:
    get:
      summary: List categories (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Categories list. }
    post:
      summary: Create category (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Category created. }

  /api/v1/admin/categories/{category_id}:
    patch:
      summary: Update category (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: category_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Category updated. }
    delete:
      summary: Delete category (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: category_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Category deleted. }

  /api/v1/admin/categories/reorder:
    post:
      summary: Reorder categories (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Categories reordered. }

  /api/v1/admin/brands:
    get:
      summary: List brands (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Brands list. }
    post:
      summary: Create brand (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Brand created. }

  /api/v1/admin/brands/{brand_id}:
    patch:
      summary: Update brand (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: brand_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Brand updated. }
    delete:
      summary: Delete brand (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: brand_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Brand deleted. }

  /api/v1/admin/products:
    get:
      summary: List products (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Product list. }

  /api/v1/admin/products/{product_id}:
    get:
      summary: Get product detail (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: product_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Product detail. }

  /api/v1/admin/health:
    get:
      summary: Admin readiness checks
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Admin health checks and readiness status. }

  /api/v1/admin/users:
    get:
      summary: Admin list users
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Paginated users list. }

  /api/v1/admin/users/{user_id}:
