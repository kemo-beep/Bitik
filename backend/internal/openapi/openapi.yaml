components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalTokenAuth:
      type: apiKey
      in: header
      name: X-Internal-Token
  schemas:
    Envelope:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        data:
          nullable: true
        error:
          $ref: "#/components/schemas/APIError"
        meta:
          type: object
          additionalProperties: true
        trace_id:
          type: string

    AuthPair:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }

    PublicUser:
      type: object
      required: [id, status, email_verified, phone_verified, created_at]
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        email_verified: { type: boolean }
        phone_verified: { type: boolean }
        created_at: { type: string, format: date-time }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }

    Ok:
      type: object
      properties:
        ok: { type: boolean }

    EnvelopeAuthPair:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthPair"

    EnvelopePublicUser:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PublicUser"

    EnvelopeOk:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Ok"
    APIError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
